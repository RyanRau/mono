name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  REPO: ${{ github.repository }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Build and push all enabled apps
        run: |
          ENABLED=$(yq '.apps | to_entries[] | select(.value.enabled == true) | .key' deploy.yml)
          for app in $ENABLED; do
            echo "=== Building $app ==="
            IMAGE=$(echo "${{ env.REGISTRY }}/${{ env.REPO }}/${app}:latest" | tr '[:upper:]' '[:lower:]')
            APP_PATH=$(yq ".apps.${app}.path // \"apps/${app}\"" deploy.yml)

            # Resolve build args from deploy.yml build_args + secrets
            BUILD_ARGS=()
            ARGS=$(yq ".apps.${app}.build_args // [] | .[]" deploy.yml 2>/dev/null || true)
            for arg in $ARGS; do
              # Map arg name to secret value
              case "$arg" in
                VITE_NHOST_SUBDOMAIN) BUILD_ARGS+=(--build-arg "VITE_NHOST_SUBDOMAIN=${{ secrets.VITE_NHOST_SUBDOMAIN }}") ;;
                VITE_NHOST_REGION) BUILD_ARGS+=(--build-arg "VITE_NHOST_REGION=${{ secrets.VITE_NHOST_REGION }}") ;;
                VITE_GALLERY_API_URL) BUILD_ARGS+=(--build-arg "VITE_GALLERY_API_URL=${{ secrets.VITE_GALLERY_API_URL }}") ;;
              esac
            done

            docker build "${BUILD_ARGS[@]}" -t "$IMAGE" -f "./${APP_PATH}/Dockerfile" .
            docker push "$IMAGE"
            echo "=== Pushed $IMAGE ==="
          done

      - name: Deploy to droplet
        uses: appleboy/ssh-action@v1
        env:
          NHOST_SUBDOMAIN: ${{ secrets.NHOST_SUBDOMAIN }}
          NHOST_REGION: ${{ secrets.NHOST_REGION }}
          DO_SPACES_ENDPOINT: ${{ secrets.DO_SPACES_ENDPOINT }}
          DO_SPACES_KEY: ${{ secrets.DO_SPACES_KEY }}
          DO_SPACES_SECRET: ${{ secrets.DO_SPACES_SECRET }}
          DO_SPACES_BUCKET: ${{ secrets.DO_SPACES_BUCKET }}
          DO_SPACES_CDN_URL: ${{ secrets.DO_SPACES_CDN_URL }}
          NHOST_ADMIN_SECRET: ${{ secrets.NHOST_ADMIN_SECRET }}
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: deploy
          key: ${{ secrets.DROPLET_SSH_KEY }}
          envs: NHOST_SUBDOMAIN,NHOST_REGION,DO_SPACES_ENDPOINT,DO_SPACES_KEY,DO_SPACES_SECRET,DO_SPACES_BUCKET,DO_SPACES_CDN_URL,NHOST_ADMIN_SECRET
          script: |
            set -e
            cd /opt/apps

            # Pull latest repo changes
            git pull origin main

            # Clean up any active test deployment
            if [ -f test-deploy.active.yml ]; then
              echo "Removing active test deployment..."
              rm test-deploy.active.yml
            fi

            # Login to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Generate fresh docker-compose.yml from config
            python3 infra/generate-compose.py

            # Pull latest images and deploy
            docker compose pull
            docker compose up -d --force-recreate --remove-orphans

            # Clean up old images
            docker image prune -f

            echo "=== Deployment complete ==="
