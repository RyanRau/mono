name: Test Deploy

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  REPO: ${{ github.repository }}

jobs:
  test-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Read test config
        id: config
        run: |
          if [ ! -f test-deploy.yml ]; then
            echo "::error::test-deploy.yml not found on this branch."
            exit 1
          fi

          # Support both single app and multi-app formats
          # Single: app: gallery
          # Multi:  apps: [gallery, gallery_api]
          APPS=$(yq '.apps // [.app] | .[]' test-deploy.yml)
          if [ -z "$APPS" ]; then
            echo "::error::No apps found in test-deploy.yml"
            exit 1
          fi

          # Build a JSON array of {name, subdomain, port} for each test app
          TEST_APPS="[]"
          for app in $APPS; do
            SUBDOMAIN=$(yq ".apps.${app}.subdomain" deploy.yml)
            PORT=$(yq ".apps.${app}.port // 80" deploy.yml)
            if [ "$SUBDOMAIN" = "null" ]; then
              echo "::error::App '${app}' not found in deploy.yml"
              exit 1
            fi
            TEST_APPS=$(echo "$TEST_APPS" | yq -o=json ". + [{\"name\": \"${app}\", \"subdomain\": \"${SUBDOMAIN}\", \"port\": ${PORT}}]")
            echo "Test app: ${app} (subdomain: ${SUBDOMAIN}, port: ${PORT})"
          done

          # Output space-separated app names for build step
          APP_LIST=$(echo "$APPS" | tr '\n' ' ' | xargs)
          echo "app_list=${APP_LIST}" >> $GITHUB_OUTPUT
          # Use multiline output format for JSON
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "test_apps<<$EOF" >> $GITHUB_OUTPUT
          echo "$TEST_APPS" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push test images
        run: |
          for APP in ${{ steps.config.outputs.app_list }}; do
            IMAGE=$(echo "${{ env.REGISTRY }}/${{ env.REPO }}/${APP}:test" | tr '[:upper:]' '[:lower:]')
            APP_PATH=$(yq ".apps.${APP}.path // \"apps/${APP}\"" deploy.yml)

            # Resolve build args from deploy.yml build_args + secrets
            BUILD_ARGS=()
            ARGS=$(yq ".apps.${APP}.build_args // [] | .[]" deploy.yml 2>/dev/null || true)
            for arg in $ARGS; do
              case "$arg" in
                VITE_NHOST_SUBDOMAIN) BUILD_ARGS+=(--build-arg "VITE_NHOST_SUBDOMAIN=${{ secrets.VITE_NHOST_SUBDOMAIN }}") ;;
                VITE_NHOST_REGION) BUILD_ARGS+=(--build-arg "VITE_NHOST_REGION=${{ secrets.VITE_NHOST_REGION }}") ;;
                VITE_GALLERY_API_URL) BUILD_ARGS+=(--build-arg "VITE_GALLERY_API_URL=https://test-gallery-api.ryanzrau.dev") ;;
              esac
            done

            echo "=== Building ${APP} (test) ==="
            docker build "${BUILD_ARGS[@]}" -t "$IMAGE" -f "./${APP_PATH}/Dockerfile" .
            docker push "$IMAGE"
            echo "=== Pushed $IMAGE ==="
          done

      - name: Copy branch deploy.yml and infra to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: deploy
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: "deploy.yml,infra/generate-compose.py"
          target: "/opt/apps"
          overwrite: true

      - name: Deploy to droplet
        uses: appleboy/ssh-action@v1
        env:
          NHOST_JWT_SECRET: ${{ secrets.NHOST_JWT_SECRET }}
          DO_SPACES_ENDPOINT: ${{ secrets.DO_SPACES_ENDPOINT }}
          DO_SPACES_KEY: ${{ secrets.DO_SPACES_KEY }}
          DO_SPACES_SECRET: ${{ secrets.DO_SPACES_SECRET }}
          DO_SPACES_BUCKET: ${{ secrets.DO_SPACES_BUCKET }}
          DO_SPACES_CDN_URL: ${{ secrets.DO_SPACES_CDN_URL }}
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: deploy
          key: ${{ secrets.DROPLET_SSH_KEY }}
          envs: NHOST_JWT_SECRET,DO_SPACES_ENDPOINT,DO_SPACES_KEY,DO_SPACES_SECRET,DO_SPACES_BUCKET,DO_SPACES_CDN_URL
          script: |
            set -e
            cd /opt/apps

            # Write active test config (multi-app format)
            cat > test-deploy.active.yml <<'ACTIVEEOF'
            ${{ steps.config.outputs.test_apps }}
            ACTIVEEOF

            # Login to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Generate docker-compose.yml from branch's deploy.yml + test config
            python3 infra/generate-compose.py

            # Restore main's files after generation
            git checkout -- deploy.yml infra/generate-compose.py

            # Pull and start only the test services (prod services already running)
            TEST_SERVICES=""
            for app in ${{ steps.config.outputs.app_list }}; do
              docker compose pull "${app}-test" || true
              TEST_SERVICES="${TEST_SERVICES} ${app}-test"
            done
            docker compose up -d --no-deps $TEST_SERVICES

            # Clean up old images
            docker image prune -f

            echo "=== Test deployment complete ==="
