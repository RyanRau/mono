name: Test Deploy

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  REPO: ${{ github.repository }}

jobs:
  test-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Read test config
        id: config
        run: |
          if [ ! -f test-deploy.yml ]; then
            echo "::error::test-deploy.yml not found on this branch. Add it with an 'app' field to specify which app to test deploy."
            exit 1
          fi

          APP=$(yq '.app' test-deploy.yml)
          if [ -z "$APP" ] || [ "$APP" = "null" ]; then
            echo "::error::No 'app' field found in test-deploy.yml"
            exit 1
          fi

          # Validate the app exists in deploy.yml
          ENABLED=$(yq ".apps.${APP}.enabled" deploy.yml)
          if [ "$ENABLED" = "null" ]; then
            echo "::error::App '${APP}' not found in deploy.yml"
            exit 1
          fi

          # Read subdomain and port from deploy.yml for the test config
          SUBDOMAIN=$(yq ".apps.${APP}.subdomain" deploy.yml)
          PORT=$(yq ".apps.${APP}.port // 80" deploy.yml)

          echo "app=${APP}" >> $GITHUB_OUTPUT
          echo "subdomain=${SUBDOMAIN}" >> $GITHUB_OUTPUT
          echo "port=${PORT}" >> $GITHUB_OUTPUT
          echo "Test deploying app: ${APP} (subdomain: ${SUBDOMAIN}, port: ${PORT})"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push test image
        run: |
          APP="${{ steps.config.outputs.app }}"
          IMAGE=$(echo "${{ env.REGISTRY }}/${{ env.REPO }}/${APP}:test" | tr '[:upper:]' '[:lower:]')
          BUILD_ARGS=()
          if [ "$APP" = "wally" ]; then
            BUILD_ARGS+=(--build-arg "VITE_NHOST_SUBDOMAIN=${{ secrets.VITE_NHOST_SUBDOMAIN }}" --build-arg "VITE_NHOST_REGION=${{ secrets.VITE_NHOST_REGION }}")
          fi
          if [ "$APP" = "gallery" ]; then
            BUILD_ARGS+=(--build-arg "VITE_NHOST_SUBDOMAIN=${{ secrets.VITE_NHOST_SUBDOMAIN }}" --build-arg "VITE_NHOST_REGION=${{ secrets.VITE_NHOST_REGION }}" --build-arg "VITE_GALLERY_API_URL=${{ secrets.VITE_GALLERY_API_URL }}")
          fi
          echo "=== Building ${APP} (test) ==="
          docker build "${BUILD_ARGS[@]}" -t "$IMAGE" -f "./apps/${APP}/Dockerfile" .
          docker push "$IMAGE"
          echo "=== Pushed $IMAGE ==="

      - name: Deploy to droplet
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: deploy
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            set -e
            cd /opt/apps

            # Restore prod deploy.yml from main (may have been overwritten by prior test deploy)
            git checkout -- deploy.yml
            git pull origin main

            # Write active test config with subdomain/port from the branch
            printf 'app: ${{ steps.config.outputs.app }}\nsubdomain: "${{ steps.config.outputs.subdomain }}"\nport: ${{ steps.config.outputs.port }}\n' > test-deploy.active.yml

            # Login to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Generate docker-compose.yml (picks up both deploy.yml and test-deploy.active.yml)
            python3 infra/generate-compose.py

            # Pull only the test image (prod images may not exist for new apps)
            docker compose pull ${{ steps.config.outputs.app }}-test
            docker compose up -d --remove-orphans

            # Clean up old images
            docker image prune -f

            echo "=== Test deployment complete ==="
