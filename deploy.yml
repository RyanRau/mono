# deploy.yml — The control plane for deployments
# Set enabled: true to deploy an app, false to take it offline

domain: ryanzrau.dev
registry: ghcr.io/ryanrau/mono
letsencrypt_email: me@ryanzrau.dev

apps:
  ryanzrau:
    subdomain: ""
    enabled: true
    port: 80
  bluestar:
    subdomain: "ui"
    enabled: true
    port: 80
    path: "packages/bluestar"
  wally:
    subdomain: "wally"
    enabled: true
    port: 80
    build_args:
      - VITE_NHOST_SUBDOMAIN
      - VITE_NHOST_REGION
  gallery:
    subdomain: "gallery"
    enabled: true
    port: 80
    build_args:
      - VITE_NHOST_SUBDOMAIN
      - VITE_NHOST_REGION
      - VITE_GALLERY_API_URL
  gallery_api:
    subdomain: "gallery-api"
    enabled: true
    port: 80
    environment:
      DO_SPACES_ENDPOINT: "${DO_SPACES_ENDPOINT}"
      DO_SPACES_KEY: "${DO_SPACES_KEY}"
      DO_SPACES_SECRET: "${DO_SPACES_SECRET}"
      DO_SPACES_BUCKET: "${DO_SPACES_BUCKET}"
      DO_SPACES_CDN_URL: "${DO_SPACES_CDN_URL}"
      NHOST_SUBDOMAIN: "${NHOST_SUBDOMAIN}"
      NHOST_REGION: "${NHOST_REGION}"
      NHOST_ADMIN_SECRET: "${NHOST_ADMIN_SECRET}"
